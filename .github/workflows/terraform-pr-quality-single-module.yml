name: Reusable Terraform PR Quality Gate (Single Module)

on:
  workflow_call:
    inputs:
      terraform-path:
        description: "Path to terraform module root in the consuming repo"
        required: false
        type: string
        default: "."
      base-sha:
        description: Base commit SHA for PR diff (required for central cross-repo caller mode)
        required: false
        type: string
        default: ""
      head-sha:
        description: Head commit SHA for PR diff (required for central cross-repo caller mode)
        required: false
        type: string
        default: ""
      pr-number:
        description: Pull request number for PR comment posting in central caller mode
        required: false
        type: number
        default: 0
      run-tfsec:
        description: Run tfsec security scan.
        required: false
        type: boolean
        default: true
      run-only-if-tf-changed:
        description: skip checks when no tf source/test files changed in PR scope
        required: false
        type: boolean
        default: true
      post-pr-comment:
        description: Post/update PR Summary comment.
        required: false
        type: boolean
        default: true
    secrets:
      github-token:
        description: Optional token for PR comment operations. Falls back to github.token when not provided
        required: false

permissions:
  contents: read

jobs:
  quality-gate:
    name: Validate terraform module
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Terraform file changes in PR scope
        id: changes
        shell: bash
        env:
          TERRAFORM_PATH: ${{ inputs['terraform-path'] }}
          BASE_SHA_INPUT: ${{ inputs['base-sha'] }}
          HEAD_SHA_INPUT: ${{ inputs['head-sha'] }}
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_ONLY_IF_TF_CHANGED: ${{ inputs['run-only-if-tf-changed'] }}
        run: |
          set -euo pipefail

          BASE_SHA="${BASE_SHA_INPUT}"
          HEAD_SHA="${HEAD_SHA_INPUT}"

          if [ -z "$BASE_SHA"  && [ "${EVENT_NAME}" = "pull_request" ; then
            BASE_SHA="${PR_BASE_SHA}"
          fi

          if [ -z "$HEAD_SHA" && ["${EVENT_NAME}" = "pull_request" ; then
            HEAD_SHA="${PR_HEAD_SHA}"
          fi

          if [ -z "$BASE_SHA" ] || [ -z "$HEAD_SHA"; then
            echo "run_checks=true" >> "$GITHUB_OUTPUT"
            echo "changed_tf_count=unknown" >> "$GITHUB_OUTPUT"
            echo "No base/head SHA provided running checks by default"
            exit 0
          fi

          CHANGED_TF_COUNT=$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" -- "${TERRAFORM_PATH}" | grep -E '\.tf$|\.tftest\.hcl$' | wc -l | tr -d ' ' || true)
          CHANGED_TF_COUNT=${CHANGED_TF_COUNT:-0}

          if [ "${RUN_ONLY_IF_TF_CHANGED}" = "true"; then
            if [ "${CHANGED_TF_COUNT}" -gt 0 ; then
              echo "run_checks=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_checks=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "run_checks=true" >> "$GITHUB_OUTPUT"
          fi

          echo "changed_tf_count=${CHANGED_TF_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        if: steps.changes.outputs.run_checks == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Setup TFLint
        if: steps.changes.outputs.run_checks == 'true'
        uses: terraform-linters/setup-tflint@v4

      - name: Install tfsec
        if: steps.changes.outputs.run_checks == 'true' && inputs['run-tfsec']
        shell: bash
        run: |
          set -euo pipefail
          TFSEC_VERSION="v1.28.11"
          curl -sSL "https://github.com/aquasecurity/tfsec/releases/download/${TFSEC_VERSION}/tfsec-linux-amd64" -o /usr/local/bin/tfsec
          chmod +x /usr/local/bin/tfsec
          tfsec --version

      - name: Run quality and security checks
        if: steps.changes.outputs.run_checks == 'true'
        id: checks
        shell: bash
        env:
          TERRAFORM_PATH: ${{ inputs['terraform-path'] }}
          RUN_TFSEC: ${{ inputs['run-tfsec'] }}
        run: |
          set -euo pipefail
          REPORTS_DIR="${GITHUB_WORKSPACE}/reports"
          mkdir -p "${REPORTS_DIR}"

          run_and_capture() {
            local name="$1"
            local cmd="$2"
            local logfile="${REPORTS_DIR}/${name}.log"
            set +e
            bash -lc "${cmd}" > "${logfile}" 2>&1
            local code=$?
            set -e

            echo "${name}_exit=${code}" >> "$GITHUB_OUTPUT"
            if [[ $code -eq 0 ]]; then
              echo "${name}: PASS" >&2
            else
              echo "${name}: FAIL" >&2
            fi

            echo "${code}"
          }

          pushd "${TERRAFORM_PATH}" > /dev/null
          FMT_EXIT="$(run_and_capture "fmt" "terraform fmt -check -recursive")"
          INIT_EXIT="$(run_and_capture "init" "terraform init -backend=false")"
          VALIDATE_EXIT="$(run_and_capture "validate" "terraform validate")"
          TEST_EXIT="$(run_and_capture "test" "terraform test")"
          TFLINT_EXIT="$(run_and_capture "tflint" "tflint --init && tflint")"

          if [[ "${RUN_TFSEC}" == "true" ]]; then
            TFSEC_EXIT="$(run_and_capture "tfsec" "tfsec --no-color .")"
          else
            TFSEC_EXIT=0
            echo "tfsec_exit=0" >> "$GITHUB_OUTPUT"
            echo "tfsec: SKIPPED"
          fi

          popd > /dev/null

          FAILED=0

          for code in "$FMT_EXIT" "$INIT_EXIT" "$VALIDATE_EXIT" "$TEST_EXIT" "$TFLINT_EXIT" "$TFSEC_EXIT"; do
            if [[ "$code" != "0" ]]; then
              FAILED=1
              break
            fi
          done

          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"

      - name: Build PR Summary
        id: summary
        shell: bash
        run: |
          set -euo pipefail
          REPORTS_DIR="${GITHUB_WORKSPACE}/reports"

          if [[ "${{steps.changes.outputs.run_checks}}" == "true" ]]; then
            {
              echo 'comment<<EOF'
              echo '<!-- terraform-pr-quality-summary -->'
              echo '## Terraform PR Validation Summary'
              echo
              echo '- INFO No Terraform Source or Test changes detected in scope'
              echo
              echo '**Result:** PASS (nothing to validate)'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          to_status() {
            if [[ "$1" == "0" ]]; then
              echo "PASS"
            else
              echo "FAIL"
            fi
          }

          FMT_STATUS=$(to_status "{{steps.checks.output.fmt_exit}}")
          INIT_STATUS=$(to_status "{{steps.checks.output.init_exit}}")
          VALIDATE_STATUS=$(to_status "{{steps.checks.output.validate_exit}}")
          TEST_STATUS=$(to_status "{{steps.checks.output.test_exit}}")
          TFLINT_STATUS=$(to_status "{{steps.checks.output.tflint_exit}}")
          TFSEC_STATUS=$(to_status "{{steps.checks.output.tfsec_exit}}")

          OVERALL="PASS"
          if [[ "${{ steps.checks.outputs.failed }}" == "1"]];
            OVERALL="FAILED"
          fi

          INIT_ERROR_SNIPPET=""
          if [[ "${INIT_STATUS}" == "FAIL" && -f "${REPORTS_DIR}/init.log" ]]; then
            INIT_ERROR_SNIPPET=$(tail -n 60 "${REPORTS_DIR}/init.log" || true)
          fi

          FMT_ERROR_SNIPPET=""
          if [[ "${FMT_STATUS}" == "FAIL" && -f "${REPORTS_DIR}/fmt.log" ]]; then
            FMT_ERROR_SNIPPET=$(tail -n 60 "${REPORTS_DIR}/fmt.log" || true)
          fi

          VALIDATE_ERROR_SNIPPET=""
          if [[ "${VALIDATE_STATUS}" == "FAIL" && -f "${REPORTS_DIR}/validate.log" ]]; then
            VALIDATE_ERROR_SNIPPET=$(tail -n 60 "${REPORTS_DIR}/validate.log" || true)
          fi

          TFSEC_ERROR_SNIPPET=""
          if [[ "${TFSEC_STATUS}" == "FAIL" && -f "${REPORTS_DIR}/tfsec.log" ]]; then
            TFSEC_ERROR_SNIPPET=$(tail -n 60 "${REPORTS_DIR}/tfsec.log" || true)
          fi

          TFLINT_ERROR_SNIPPET=""
          if [[ "${TFLINT_STATUS}" == "FAIL" && -f "${REPORTS_DIR}/tflint.log" ]]; then
            TFLINT_ERROR_SNIPPET=$(tail -n 60 "${REPORTS_DIR}/tflint.log" || true)
          fi

          TEST_ERROR_SNIPPET=""
          if [[ "${TEST_STATUS}" == "FAIL" && -f "${REPORTS_DIR}/test.log" ]]; then
            TEST_ERROR_SNIPPET=$(tail -n 60 "${REPORTS_DIR}/test.log" || true)
          fi

          {
            echo 'comment<<EOF'
            echo '<!-- terraform-pr-quality-summary -->'
            echo '## Terraform PR Validation Summary'
            echo
            echo 'Check: `terraform fmt -check -recursive`, `terraform init -backend=false`, `terraform validate`, `terraform test`, `tflint`, `tfsec`'
            echo
            echo '| Scope | Overall | fmt | init | validate | test | tflint | tfsec |'
            echo '|---|---|---|---|---|---|---|---|'
            echo '| ${{inputs['terraform-path']}} | ${OVERALL} | ${FMT_STATUS} | ${INIT_STATUS} | ${VALIDATE_STATUS} | ${TEST_STATUS} | ${TFLINT_STATUS} | ${TFSEC_STATUS} |'
            echo
            if [[ "${OVERALL}" == "PASS" ]]; then
              echo '**Result:** PASS (quality/security checks passed)'
            else
              echo '**Result:** FAIL (quality/security checks failed)'
            fi
            if [[ -n "${INIT_ERROR_SNIPPET}" ]]; then
              echo
              echo '### terraform init error (last 60 lines)'
              echo '```text'
              echo '${INIT_ERROR_SNIPPET}'
              echo '```'
            fi
            if [[ -n "${VALIDATE_ERROR_SNIPPET}" ]]; then
              echo
              echo '### terraform validate error (last 60 lines)'
              echo '```text'
              echo '${VALIDATE_ERROR_SNIPPET}'
              echo '```'
            fi
            if [[ -n "${FMT_ERROR_SNIPPET}" ]]; then
              echo
              echo '### terraform fmt error (last 60 lines)'
              echo '```text'
              echo '${FMT_ERROR_SNIPPET}'
              echo '```'
            fi
            if [[ -n "${TEST_ERROR_SNIPPET}" ]]; then
              echo
              echo '### terraform test error (last 60 lines)'
              echo '```text'
              echo '${TEST_ERROR_SNIPPET}'
              echo '```'
            fi
            if [[ -n "${TFLINT_ERROR_SNIPPET}" ]]; then
              echo
              echo '### tflint error (last 60 lines)'
              echo '```text'
              echo '${TFLINT_ERROR_SNIPPET}'
              echo '```'
            fi
            if [[ -n "${TFSEC_ERROR_SNIPPET}" ]]; then
              echo
              echo '### tfsec error (last 60 lines)'
              echo '```text'
              echo '${TFSEC_ERROR_SNIPPET}'
              echo '```'
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: create or update pr comment
        if: inputs['post-pr-comment'] && (github.event_name == 'pull_request' || inputs['pr-number'] > 0)
        uses: actions/github-script@v7
        env:
          SUMMARY_COMMENT: ${{steps.summary.outputs.comment}}
        with:
          github-token: ${{ secrets['github-token'] || github.token }}
          script: |
            const marker = '<!-- terraform-pr-quality-summary -->';
            const body = process.env.SUMMARY_COMMENT;

            const {owner, repo} = context.repo;
            const issue_number = Number('${{inputs['pr-number']}}') || context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: fail pipeline if checks failed
        if: steps.changes.outputs.run_checks == 'true' && steps.checks.outputs.failed == '1'
        shell: bash
        run: |
          echo "One or more quality/security checks failed"
          exit 1
