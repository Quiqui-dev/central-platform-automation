name: Reusable Terraform PR Quality Gate (Single Module)

on:
  workflow_call:
    inputs:
      terraform-path:
        description: "Path to terraform module root in the consuming repo"
        required: false
        type: string
        default: "."
      base-sha:
        description: Base commit SHA for PR diff (required for central cross-repo caller mode)
        required: false
        type: string
        default: ""
      head-sha:
        description: Head commit SHA for PR diff (required for central cross-repo caller mode)
        required: false
        type: string
        default: ""
      pr-number:
        description: Pull request number for PR comment posting in central caller mode
        required: false
        type: number
        default: 0
      run-tfsec:
        description: Run tfsec security scan.
        required: false
        type: boolean
        default: true
      run-only-if-tf-changed:
        description: skip checks when no tf source/test files changed in PR scope
        required: false
        type: boolean
        default: true
      post-pr-comment:
        description: Post/update PR Summary comment.
        required: false
        type: boolean
        default: true
    secrets:
      github-token:
        description: Optional token for PR comment operations. Falls back to github.token when not provided
        required: false

permissions:
  contents: read

jobs:
  quality-gate:
    name: Validate terraform module
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Terraform file changes in PR scope
        id: changes
        shell: bash
        env:
          TERRAFORM_PATH: ${{ inputs['terraform-path'] }}
          BASE_SHA_INPUT: ${{ inputs['base-sha'] }}
          HEAD_SHA_INPUT: ${{ inputs['head-sha'] }}
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_ONLY_IF_TF_CHANGED: ${{ inputs['run-only-if-tf-changed'] }}
        run: |
          set -euo pipefail

          BASE_SHA="${BASE_SHA_INPUT}"
          HEAD_SHA="${HEAD_SHA_INPUT}"

          if [ -z "$BASE_SHA"]; then
            if ["${EVENT_NAME}" = "pull_request"]; then
              BASE_SHA="${PR_BASE_SHA}"
            fi
          fi

          if [ -z "$HEAD_SHA"]; then 
            if ["${EVENT_NAME}" = "pull_request" ]; then
              HEAD_SHA="${PR_HEAD_SHA}"
            fi
          fi

          if [ -z "$BASE_SHA" ] || [ -z "$HEAD_SHA" ]; then
            echo "run_checks=true" >> "$GITHUB_OUTPUT"
            echo "changed_tf_count=unknown" >> "$GITHUB_OUTPUT"
            echo "No base/head SHA provided running checks by default"
            exit 0
          fi

          SCOPE_PATH="${TERRAFORM_PATH#./}"
          SCOPE_PATH="${SCOPE_PATH%/}"

          if ! git cat-file -e "${BASE_SHA}^{comment}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "${BASE_SHA}" || true
          fi

          if ! git cat-file -e "${HEAD_SHA}^{comment}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "${HEAD_SHA}" || true
          fi

          # fallback when SHAs not directly fetchable in PR context
          if ! git cat-file -e "${BASE_SHA}^{comment}" 2>/dev/null || ! git cat-file -e "${HEAD_SHA}^{comment}" 2>/dev/null; then
            if [ "${EVENT_NAME}" == "pull_request"] && [ -n "${PR_BASE_REF}"]; then
              echo "falling back to PR base ref comparison using origin/${PR_BASE_REF}"
              git fetch --no-tags --depth=1 origin "${PR_BASE_REF}" || true
              if git rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
                BASE_SHA="$(git rev-parse FETCH_HEAD)"
                HEAD_SHA="$(git rev-parse HEAD)"
                echo "Fallback SHAs resolved: base=${BASE_SHA} head=${HEAD_SHA}"
              fi
            fi
          fi

          if ! git cat-file -e "${BASE_SHA}^{comment}" 2>/dev/null || ! git cat-file -e "${HEAD_SHA}^{comment}" 2>/dev/null; then
            echo "Unable to resolve one or both diff SHAs locally; running checks by default."
            echo "run_checks=true" >> "$GITHUB_OUTPUT"
            echo "changed_tf_count=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DIFF_OUTPUT=""
          if ! DIFF_OUTPUT="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"; then
            echo "git diff failed; running checks by default."
            echo "run_checks=true" >> "$GITHUB_OUTPUT"
            echo "changed_tf_count=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_TF_COUNT=0
          MATCHED_FILES=""

          while IFS= read -r file; do
            if [ -z "${file}" ]; then
              continue
            fi

            in_scope=false
            if [ -z "${SCOPE_PATH}" ] || [ "${SCOPE_PATH}" = "."]; then
              in_scope=true
            else
              case "${file}" in
                "${SCOPE_PATH}"|"${SCOPE_PATH}/*")
                  in_scope=true
                  ;;
              esac
            fi

            if [ "${in_scope}" != "true"]; then
              continue
            fi

            case "$file" in
              *.tf|*.tfvar|*.tf.json|*.tftest.hcl)
                CHANGED_TF_COUNT=$((CHANGED_TF_COUNT + 1))
                MATCHED_FILES+= " - ${file}"$'\n'
                ;;
            esac
          done <<< "${DIFF_OUTPUT}"

          echo "Terraform-related changed files (${CHANGED_TF_COUNT}) in scope (${SCOPE_PATH:-.})."
          if [ "${CHANGED_TF_COUNT}" -gt 0]; then
            printf '%s' "${MATCHED_FILES}"
          fi

          if [ "${RUN_ONLY_IF_TF_CHANGED}" = "true" ] && [ "${CHANGED_TF_COUNT}" -eq 0]; then
            echo "run_checks=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_checks=false" >> "$GITHUB_OUTPUT"
          fi

          echo "changed_tf_count=${CHANGED_TF_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        if: steps.changes.outputs.run_checks == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Setup TFLint
        if: steps.changes.outputs.run_checks == 'true'
        uses: terraform-linters/setup-tflint@v4

      - name: Install tfsec
        if: steps.changes.outputs.run_checks == 'true' && inputs['run-tfsec']
        shell: bash
        run: |
          set -euo pipefail
          TFSEC_VERSION="v1.28.11"
          curl -sSL "https://github.com/aquasecurity/tfsec/releases/download/${TFSEC_VERSION}/tfsec-linux-amd64" -o /usr/local/bin/tfsec
          chmod +x /usr/local/bin/tfsec
          tfsec --version

      - name: Run quality and security checks
        if: steps.changes.outputs.run_checks == 'true'
        id: checks
        shell: bash
        env:
          TERRAFORM_PATH: ${{ inputs['terraform-path'] }}
          RUN_TFSEC: ${{ inputs['run-tfsec'] }}
        run: |
          set -euo pipefail
          REPORTS_DIR="${GITHUB_WORKSPACE}/reports"
          mkdir -p "${REPORTS_DIR}"

          run_and_capture() {
            local name="$1"
            local cmd="$2"
            local logfile="${REPORTS_DIR}/${name}.log"
            set +e
            bash -lc "${cmd}" > "${logfile}" 2>&1
            local code=$?
            set -e

            echo "${name}_exit=${code}" >> "$GITHUB_OUTPUT"
            if [[ $code -eq 0 ]]; then
              echo "${name}: PASS" >&2
            else
              echo "${name}: FAIL" >&2
            fi

            echo "${name}: "
            echo "${code}"
          }

          pushd "${TERRAFORM_PATH}" > /dev/null
          FMT_EXIT="$(run_and_capture "fmt" "terraform fmt -check -recursive")"
          INIT_EXIT="$(run_and_capture "init" "terraform init -backend=false")"
          VALIDATE_EXIT="$(run_and_capture "validate" "terraform validate")"
          TEST_EXIT="$(run_and_capture "test" "terraform test")"
          TFLINT_EXIT="$(run_and_capture "tflint" "tflint --init && tflint")"

          if [[ "${RUN_TFSEC}" == "true" ]]; then
            TFSEC_EXIT="$(run_and_capture "tfsec" "tfsec --no-color .")"
          else
            TFSEC_EXIT=0
            echo "tfsec_exit=0" >> "$GITHUB_OUTPUT"
            echo "tfsec: SKIPPED"
          fi

          popd > /dev/null

          FAILED=0

          for code in "$FMT_EXIT" "$INIT_EXIT" "$VALIDATE_EXIT" "$TEST_EXIT" "$TFLINT_EXIT" "$TFSEC_EXIT"; do
            if [[ "$code" != "0" ]]; then
              FAILED=1
              break
            fi
          done

          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"

      - name: create or update pr comment
        if: inputs['post-pr-comment'] && (github.event_name == 'pull_request' || inputs['pr-number'] > 0)
        uses: actions/github-script@v7
        env:
          REPORTS_DIR: ${{ github.workspace }}/reports
          RUN_CHECKS: ${{ steps.changes.outputs.run_checks }}
          FMT_EXIT: ${{ steps.checks.outputs.fmt_exit }}
          INIT_EXIT: ${{ steps.checks.outputs.init_exit }}
          VALIDATE_EXIT: ${{ steps.checks.outputs.validate_exit }}
          TEST_EXIT: ${{ steps.checks.outputs.test_exit }}
          TFLINT_EXIT: ${{ steps.checks.outputs.tflint_exit }}
          TFSEC_EXIT: ${{ steps.checks.outputs.tfsec_exit }}
          FAILED_FLAG: ${{ steps.checks.outputs.failed }}
          RUN_URL: ${{ github.server_url }}/${{github.repository}}/actions/runs/${{github.run_id}}
          RUN_ATTEMPT: ${{github.run_attempt}}
          TERRAFORM_PATH_INPUT: ${{inputs['terraform-path']}}
        with:
          github-token: ${{ secrets['github-token'] || github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const marker = '<!-- terraform-pr-quality-summary:reusable-single-module -->';

            const toStatus = (value) => {
              if (value === undefined || value === null || value === '') return 'UNKNOWN';
              return String(value) === '0' ? 'PASS' : 'FAIL';
            }

            const sanitiseSnippet = (text) => {
              // Remove ANSI escape codes and other chars that break markdown
              return String(text)
                .replace(/\u001b\[[0-9;?]*[ -/]*[@-~]/g, '')
                .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '')
                .trim();
            }

            const runChecks = process.env.RUN_CHECKS;
            let body = `${marker}\n## Terraform PR Validation Summary\n\n`;

            if (runChecks !== 'true') {              
              body += '- INFO No Terraform Source or Test changes detected in scope.\n\n';
              body += '**Result:** PASS (nothing to validate)';
            } else {
              const fmtStatus = toStatus(process.env.FMT_EXIT); 
              const initStatus = toStatus(process.env.INIT_EXIT);
              const validateStatus = toStatus(process.env.VALIDATE_EXIT);
              const testStatus = toStatus(process.env.TEST_EXIT);
              const tflintStatus = toStatus(process.env.TFLINT_EXIT);
              const tfsecStatus = toStatus(process.env.TFSEC_EXIT);
              const overall = process.env.FAILED_FLAG === '1' ? 'FAIL' : 'PASS';

              body += `Run: ${process.env.RUN_URL} (attempt ${process.env.RUN_ATTEMPT})\n\n`;
              body += 'Check: `terraform fmt -check -recursive`, `terraform init -backend=false`, `terraform validate`, `terraform test`, `tflint`, `tfsec`\n\n';
              body += '| Scope | Overall | fmt | init | validate | test | tflint | tfsec |\n';
              body += '|---|---|---|---|---|---|---|---|\n';
              body += `| ${process.env.TERRAFORM_PATH_INPUT} | ${overall} | ${fmtStatus} | ${initStatus} | ${validateStatus} | ${testStatus} | ${tflintStatus} | ${tfsecStatus} |\n\n`;

              if (overall === 'PASS') {
                body += '**Result:** PASS (quality/security checks passed)';
              } else {
                body += '**Result:** FAIL (quality/security checks failed)';
              }
              
              const reportsDir = process.env.REPORTS_DIR || path.join(process.cwd(), 'reports');
              const appendErrorSnippet = (title, fileName, shouldAppend) => {
                if (!shouldAppend) return;
                const filePath = path.join(reportsDir, fileName);
                if (!fs.existsSync(filePath)) return;
                const lines = fs.readFileSync(filePath, 'utf8').split(/\r?\n/);
                const snippet = sanitiseSnippet(lines.slice(-60).join('\n'));
                if (!snippet) return;
                body += `\n\n### ${title}\n\n\`\`\`text\n${snippet}\n\`\`\``;
              }

              appendErrorSnippet('terraform init error (last 60 lines)', 'init.log', initStatus === 'FAIL');
              appendErrorSnippet('terraform validate error (last 60 lines)', 'validate.log', validateStatus === 'FAIL');
              appendErrorSnippet('terraform fmt error (last 60 lines)', 'fmt.log', fmtStatus === 'FAIL');
              appendErrorSnippet('terraform test error (last 60 lines)', 'test.log', testStatus === 'FAIL');
              appendErrorSnippet('tflint error (last 60 lines)', 'tflint.log', tflintStatus === 'FAIL');
              appendErrorSnippet('tfsec error (last 60 lines)', 'tfsec.log', tfsecStatus === 'FAIL');

            }

            if (!body || body.trim().length === 0) {
              core.setFailed('Summary body is empty; vannot create/update PR comment.')
              return;
            }

            const {owner, repo} = context.repo;
            const issue_number = Number('${{inputs['pr-number']}}') || context.issue.number;

            core.info(`Targeting PR #${issue_number} in ${owner}/${repo}`)

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              core.info(`Updating existing summary comment id=${existing.id}`)
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              core.info('Creating new summary comment')
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: fail pipeline if checks failed
        if: steps.changes.outputs.run_checks == 'true' && steps.checks.outputs.failed == '1'
        shell: bash
        run: |
          echo "One or more quality/security checks failed"
          exit 1
